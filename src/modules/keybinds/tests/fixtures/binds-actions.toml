[[bind]]
id = "action.resize"
enabled = true
modifiers = ["SUPER"]
key = "mouse:273"
category = "Ventanas"
description = "Redimensionar"
action = "window.resize"
mouse = true

[[bind]]
id = "action.layout"
enabled = true
modifiers = ["SUPER"]
