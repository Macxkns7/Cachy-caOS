category = "Ventanas"
description = "Foco"
action = "focus"
argument = "left"

[[bind]]
id = "action.workspace"
enabled = true
modifiers = ["SUPER"]
key = "1"
category = "Workspaces"
description = "Workspace"
action = "workspace.focus"
argument = "1"

[[bind]]
id = "action.special"
enabled = true
modifiers = ["SUPER"]
key = "S"
category = "Workspaces"
description = "Especial"
action = "workspace.special"
argument = "magic"

[[bind]]
id = "action.move"
enabled = true
modifiers = ["SUPER", "SHIFT"]
key = "1"
category = "Workspaces"
description = "Mover"
action = "window.move"
argument = "1"
