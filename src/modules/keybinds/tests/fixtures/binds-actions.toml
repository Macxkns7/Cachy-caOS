version = 1

[[bind]]
id = "action.exec"
enabled = true
modifiers = ["SUPER"]
key = "Q"
category = "Aplicaciones"
description = "Ejecutar"
action = "exec"
argument = "kitty"

[[bind]]
id = "action.close"
enabled = true
modifiers = ["SUPER"]
key = "C"
category = "Ventanas"
description = "Cerrar"
action = "window.close"

[[bind]]
id = "action.float"
enabled = true
modifiers = ["SUPER"]
key = "V"
category = "Ventanas"
description = "Flotante"
action = "window.float.toggle"

[[bind]]
id = "action.pseudo"
enabled = true
modifiers = ["SUPER"]
key = "P"
category = "Ventanas"
description = "Pseudo"
action = "window.pseudo"

[[bind]]
id = "action.fullscreen"
enabled = true
modifiers = ["SUPER"]
key = "F"
category = "Ventanas"
description = "Pantalla completa"
action = "window.fullscreen"

[[bind]]
id = "action.drag"
enabled = true
modifiers = ["SUPER"]
key = "mouse:272"
category = "Ventanas"
description = "Arrastrar"
action = "window.drag"
